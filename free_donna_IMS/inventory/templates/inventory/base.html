<!doctype html>
<html lang="es">
  <head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="{% static 'css/productos.css' %}">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'inventory/static/img/header.jpg' %}">
    <meta charset="UTF-8" />
    <title>{% block title %}Free Donna IMS{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body style="margin: 0; font-family: Arial, sans-serif; background: #f5f6fa">
    <!-- HEADER -->
    <header style="
  background:#2c3e50;
  color:white;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  padding:12px 20px;
  gap:12px;
">
  <div style="display:flex; align-items:center; gap:12px;">
    <!-- Imagen -->
    <img 
      src="{% static 'inventory/static/img/header.jpg' %}"
      alt="Free Donna"
      style="
        height:48px;
        width:auto;
        max-width:120px;
        object-fit:contain;
      "
    />

    <!-- Título -->
    <div style="font-size:20px; font-weight:bold;">
      <a href="{% url 'inventory:index' %}" 
      style="color:white; text-decoration:none;font-size:30px; font-weight:bold;"">Free Donna</a>
    </div>
  </div>

  <!-- Menú -->
<nav style="display:flex; gap:18px; flex-wrap:wrap; align-items:center;">

  <!-- POS / Carrito -->
  <a 
    href="{% url 'inventory:pos' %}"
    style="
      color:white;
      text-decoration:none;
      font-size:18px;
      display:flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:10px;
      background: rgba(255,255,255,0.12);
    "
  >
    🛒 <span style="font-weight:700;"></span>
  </a>
  <a href="{% url 'inventory:producto_list' %}" style="color:white; text-decoration:none;">Productos</a>
  <a href="{% url 'inventory:articulo_list' %}" style="color:white; text-decoration:none;">Artículos</a>
  {% if request.user.is_authenticated %}
    <a style="color: beige;" href="{% url 'inventory:logout' %}">Salir</a>
  {% else %}
    <a style="color: beige;" href="{% url 'inventory:login' %}">Ingresar</a>
  {% endif %}
</nav>
</header>


    <!-- CONTENIDO -->
    <main style="padding: 30px; background-color: #d7e2f9;;">{% block content %}{% endblock %}</main>

    <!-- FOOTER -->
    <footer
      style="
        background: #634a2f;
        color: #bdc3c7;
        text-align: center;
        padding: 12px;
        position: fixed;
        bottom: 0;
        width: 100%;
        font-size: 14px;
      "
    >
      Free Donna IMS · Sistema de Gestión de Inventario
      <br />
      © {{ now|default:"2026" }}
    </footer>
  </body>
</html>
